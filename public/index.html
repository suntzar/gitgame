<!doctype html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitGame - Nível ? (Co-op Conceitual)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/darcula.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/node-waves/0.7.6/waves.min.css" />

    <style>
        :root {
            --tp-accent: #e56700;
            --tp-accent-hover: #fca34d;
            --tp-accent-rgb: 229, 103, 0;
            --turn-time-total: 30;
        }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex-grow: 1; }
        .header-title { margin: 0; font-size: 1.8rem; font-weight: 600; }
        .header-title .git-part { color: var(--tp-accent); }
        h2.card-title { font-weight: 600; border-left: 4px solid var(--tp-accent); padding-left: 0.8rem; margin-bottom: 1rem; margin-top: 0; }
        accent, .text-accent { color: var(--tp-accent); font-weight: 500; }
        code:not(pre code) { background-color: rgba(108,117,125,0.2); color: #f8f9fa; padding: 0.2em 0.4em; border-radius: 0.25rem; font-size: 85%; }
        .output-block { font-family: monospace; font-size: 0.9rem; background-color: #343a40; color: #ced4da; padding: 1rem; border-radius: 0.25rem; margin-top: 1.5rem; min-height: 80px; white-space: pre-wrap; word-break: break-word; border: 1px solid #495057; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        .output-block.success { color: #198754; border-left: 4px solid #198754; background-color: rgba(25,135,84,0.1); }
        .output-block.error { color: #dc3545; border-left: 4px solid #dc3545; background-color: rgba(220,53,69,0.1); }

        /* Status e Turnos */
        #gameStatusArea { }
        #currentPlayerIndicator { font-size: 0.9rem; white-space: nowrap; }
        #turnTimerProgressContainer { min-width: 50px; }
        #turnTimerProgress { height: 1rem; font-size: 0.75rem; transition: width 0.3s ease-out, background-color 0.5s ease; }
        #turnTimeDisplay { font-size: 0.9rem; font-weight: 500; white-space: nowrap; }
        /* Editor */
        .codemirror-container { padding: 0; overflow: hidden; border: 1px solid #495057; border-radius: 0.25rem; margin-bottom: 1rem; background-color: #212529; }
        .CodeMirror { border: none; border-radius: inherit; }
    </style>
</head>
<body>
    <header class="p-3 border-bottom shadow-sm">
        <div class="d-flex align-items-center">
             <h1 class="header-title me-auto"><span class="git-part">Git</span>Game <small class="text-body-secondary fs-6 fw-normal">(Co-op Conceitual)</small></h1>
        </div>
    </header>

    <main class="container-lg py-4">
        <div class="card bg-body-tertiary mb-4 shadow-sm">
            <div class="card-body">
                <h2 class="card-title"><span class="text-accent" id="levelTitle">Nível ?</span></h2>
                <p id="levelDescription" class="card-subtitle mb-3 text-body-secondary">Carregando informações do nível...</p>
                <p class="mb-1 fw-medium">Saída esperada:</p>
                <code id="expectedOutput" class="d-block bg-body-secondary p-2 rounded">-</code>
            </div>
        </div>

        <div class="codemirror-container shadow-sm">
             <textarea id="code" class="editor" aria-label="Editor de Código Python Colaborativo" aria-describedby="levelDescription"># Seu código aqui...
</textarea>
        </div>

        <div id="gameStatusArea" class="d-flex align-items-center gap-3 bg-body-tertiary p-2 rounded shadow-sm mb-4">
            <span id="currentPlayerIndicator" class="fw-bold flex-shrink-0" title="Jogador atual">Carregando...</span>
            <div class="progress flex-grow-1" role="progressbar" aria-label="Tempo restante do turno" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" id="turnTimerProgressContainer">
                <div class="progress-bar progress-bar-striped progress-bar-animated" id="turnTimerProgress" style="width: 100%"></div>
            </div>
            <span id="turnTimeDisplay" class="text-body-secondary flex-shrink-0" title="Tempo restante">--:--</span>
            <button type="button" id="passTurnButton" class="btn btn-secondary btn-sm waves-effect waves-light flex-shrink-0" title="Passar a Vez" disabled>
                 <i data-feather="fast-forward"></i>
                 <span class="visually-hidden">Passar a Vez</span>
            </button>
        </div>

        <div class="d-flex justify-content-between gap-2 gap-md-3 mb-4">
            <button type="button" id="resetButton" class="btn btn-danger waves-effect waves-light flex-fill" title="Resetar código e turno">
                <i data-feather="trash-2" class="me-1"></i> Resetar
            </button>
            <button type="button" id="runButton" class="btn btn-success waves-effect waves-light flex-fill" title="Executar o código (simulação)">
                <i data-feather="play" class="me-1"></i> Run
            </button>
            <button type="button" id="sendButton" class="btn btn-accent waves-effect waves-light flex-fill" title="Enviar código final para validação">
                <i data-feather="send" class="me-1"></i> Enviar
            </button>
        </div>

        <div id="output" class="output-block" role="log" aria-live="polite">A saída do seu código aparecerá aqui...</div>
    </main>

    <footer class="mt-auto p-3 text-center text-body-secondary border-top">
        GitGame &copy; <span id="currentYear"></span>
    </footer>

    <!-- Bibliotecas -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/node-waves/0.7.6/waves.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/selection/active-line.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    
    <script>
    document.addEventListener("DOMContentLoaded", function () {
        // Variáveis de turno e tempo
        let editor;
        let myID = null, currentTurnID = null;
        const TOTAL_TURN_TIME = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--turn-time-total').trim()) || 30;
        let turnTimeRemaining = TOTAL_TURN_TIME;
        let timerIntervalId = null;
        let isMyTurn = false;
        let currentPlayer = null;

        // Seletores
        const currentPlayerIndicator = document.getElementById('currentPlayerIndicator');
        const turnTimeDisplay = document.getElementById('turnTimeDisplay');
        const turnTimerProgress = document.getElementById('turnTimerProgress');
        const passTurnButton = document.getElementById('passTurnButton');
        const runButton = document.getElementById('runButton');
        const resetButton = document.getElementById('resetButton');
        const sendButton = document.getElementById('sendButton');
        const outputDiv = document.getElementById('output');
        const yearSpan = document.getElementById('currentYear');
        const editorElement = document.getElementById("code");

        // Inicializa CodeMirror
        editor = CodeMirror.fromTextArea(editorElement, {
            mode: "python",
            theme: "darcula",
            lineNumbers: true,
            indentUnit: 4,
            matchBrackets: true,
            styleActiveLine: true,
            autofocus: true,
            readOnly: "nocursor"
        });
        setTimeout(() => { editor.refresh(); }, 100);

        // Inicializa Feather e Waves
        feather.replace();
        Waves.init();
        Waves.attach(".btn", ["waves-light"]);

        // Socket.io
        const socket = io();

        socket.on('yourID', id => { myID = id; });
        socket.on('stateUpdate', (state) => {
            editor.setValue(state.currentCode);
            updateLevelInfo(state.currentLevel);
            document.getElementById("output").textContent = "";
        });
        socket.on('codeUpdate', (newCode) => {
            const current = editor.getValue();
            if (current !== newCode) {
                const cursor = editor.getCursor();
                editor.setValue(newCode);
                editor.setCursor(cursor);
            }
        });
        socket.on('timerUpdate', (elapsed) => {
            // Este timer refere-se ao nível (global), não ao turno
        });
        socket.on('timerReset', () => { /* Pode atualizar se necessário */ });
        socket.on('turnUpdate', (turnID) => {
            currentTurnID = turnID;
            isMyTurn = (myID === turnID);
            currentPlayer = isMyTurn ? "Você" : turnID;
            updateTurnUI();
            if (isMyTurn) startTurnTimer(); else stopTurnTimer();
        });
        socket.on('submissionResult', (result) => { outputDiv.textContent = result.message; outputDiv.className = "output-block " + (result.success ? "success" : "error"); });
        socket.on('gameComplete', (message) => { alert(message); editor.setValue(""); });

        // Atualiza informações do nível (pode ser enriquecido se o servidor enviar mais dados)
        function updateLevelInfo(level) {
            document.getElementById('levelTitle').textContent = "Nível " + level.id;
            document.getElementById('levelDescription').textContent = level.context + " " + level.command;
            if (level.inputs) {
                document.getElementById('expectedOutput').innerHTML = `<span class="text-accent">Input:</span> ${level.chosenInput.join(", ")} | <span class="text-accent">Saída esperada (${level.expectedType}):</span> ${level.chosenExpectedOutput}`;
            } else {
                document.getElementById('expectedOutput').innerHTML = `<span class="text-accent">Saída esperada (${level.expectedType}):</span> ${level.expectedValue}`;
            }
            document.title = `GitGame - Nível ${level.id}`;
        }

        // Lógica do cronômetro de turno
        function updateTurnUI() {
            currentPlayerIndicator.textContent = isMyTurn ? "Sua vez" : "Vez: " + currentTurnID;
            passTurnButton.disabled = !isMyTurn;
            if (isMyTurn) {
                editor.setOption("readOnly", false);
                editor.display.wrapper.style.opacity = "1";
            } else {
                editor.setOption("readOnly", "nocursor");
                editor.display.wrapper.style.opacity = "0.7";
            }
            updateTurnTimerUI();
        }

        function updateTurnTimerUI() {
            const percentage = Math.max(0, (turnTimeRemaining / TOTAL_TURN_TIME) * 100);
            turnTimerProgress.style.width = `${percentage}%`;
            turnTimerProgress.setAttribute("aria-valuenow", percentage);
            const minutes = Math.floor(turnTimeRemaining / 60);
            const seconds = turnTimeRemaining % 60;
            turnTimeDisplay.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            turnTimerProgress.classList.remove('bg-success', 'bg-warning', 'bg-danger');
            if (percentage > 50) turnTimerProgress.classList.add('bg-success');
            else if (percentage > 20) turnTimerProgress.classList.add('bg-warning');
            else turnTimerProgress.classList.add('bg-danger');
        }

        function stopTurnTimer() { if (timerIntervalId) { clearInterval(timerIntervalId); timerIntervalId = null; } }

        function startTurnTimer() {
            stopTurnTimer();
            turnTimeRemaining = TOTAL_TURN_TIME;
            timerIntervalId = setInterval(() => {
                turnTimeRemaining--;
                updateTurnTimerUI();
                if (turnTimeRemaining < 0) { turnTimeRemaining = 0; updateTurnTimerUI(); switchTurn(); }
            }, 1000);
        }

        function switchTurn() {
            stopTurnTimer();
            socket.emit('passTurn');
        }

        // Envio de atualizações do editor com debounce
        function debounce(func, delay) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), delay);
            };
        }
        editor.on("change", debounce(() => { if (isMyTurn) socket.emit('codeUpdate', editor.getValue()); }, 300));

        // Botões
        resetButton.addEventListener("click", () => { if (confirm("Resetar código e turno?")) socket.emit('resetGame'); });
        passTurnButton.addEventListener("click", () => { if (isMyTurn && confirm("Passar sua vez?")) socket.emit('passTurn'); });
        runButton.addEventListener("click", () => {
            // Executa uma simulação local (opcional)
            outputDiv.textContent = "Simulação: executando...";
            setTimeout(() => { outputDiv.textContent = "Saída simulada"; outputDiv.className = "output-block success"; }, 300);
        });
        sendButton.addEventListener("click", () => { socket.emit('submitCode'); });

        // Atualiza o ano do rodapé
        yearSpan.textContent = new Date().getFullYear();
    });
    </script>
</body>
</html>
