<!doctype html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitGame - Lobby</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/darcula.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/node-waves/0.7.6/waves.min.css" />
    <style>
        /* Estilos gerais baseados no template fornecido */
        :root {
            --tp-accent: #e56700;
            --tp-accent-hover: #fca34d;
            --tp-accent-rgb: 229, 103, 0;
            --turn-time-total: 60;
        }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex-grow: 1; }
        .header-title { margin: 0; font-size: 1.8rem; font-weight: 600; }
        .header-title .git-part { color: var(--tp-accent); }
        .output-block { font-family: monospace; font-size: 0.9rem; background-color: #343a40; color: #ced4da; padding: 1rem; border-radius: 0.25rem; margin-top: 1.5rem; white-space: pre-wrap; border: 1px solid #495057; }
        .output-block.success { color: #198754; border-left: 4px solid #198754; background-color: rgba(25,135,84,0.1); }
        .output-block.error { color: #dc3545; border-left: 4px solid #dc3545; background-color: rgba(220,53,69,0.1); }
        .btn-accent { --bs-btn-color: #fff; --bs-btn-bg: var(--tp-accent); --bs-btn-border-color: var(--tp-accent); --bs-btn-hover-color: #fff; --bs-btn-hover-bg: var(--tp-accent-hover); --bs-btn-hover-border-color: var(--tp-accent-hover); --bs-btn-focus-shadow-rgb: var(--tp-accent-rgb); --bs-btn-active-color: #fff; --bs-btn-active-bg: var(--tp-accent-hover); --bs-btn-active-border-color: var(--tp-accent-hover); }
        .codemirror-container { padding: 0; overflow: hidden; border: 1px solid #495057; border-radius: 0.25rem; margin-bottom: 1rem; background-color: #343a40; }
        .CodeMirror { border: none; border-radius: inherit; }
        .cm-s-darcula { background-color: #2b2b2b; color: #a9b7c6; font-family: monospace; font-size: 0.95rem; }
    </style>
</head>
<body>
    <header class="p-3 border-bottom shadow-sm">
        <div class="d-flex align-items-center">
             <h1 class="header-title me-auto"><span class="git-part">Git</span>Game <small class="text-body-secondary fs-6 fw-normal">(Co-op Turno Compacto)</small></h1>
        </div>
    </header>
  
    <!-- Tela de Lobby -->
    <main class="container-lg py-4" id="lobbyArea">
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h2 class="card-title">Criar ou Entrar em uma Sala</h2>
                <form id="lobbyForm">
                    <div class="mb-3">
                        <label for="roomName" class="form-label">Nome da Sala</label>
                        <input type="text" class="form-control" id="roomName" required>
                    </div>
                    <div class="mb-3">
                        <label for="roomPassword" class="form-label">Senha da Sala (opcional)</label>
                        <input type="password" class="form-control" id="roomPassword">
                    </div>
                    <div class="mb-3">
                        <label for="playerName" class="form-label">Seu Nome</label>
                        <input type="text" class="form-control" id="playerName" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="isHost">
                        <label class="form-check-label" for="isHost">Criar Sala (Host)</label>
                    </div>
                    <div class="mb-3" id="hostOptions" style="display: none;">
                        <label for="turnTime" class="form-label">Tempo por Turno (segundos)</label>
                        <input type="number" class="form-control" id="turnTime" value="60" min="10" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </form>
            </div>
        </div>
    </main>
  
    <!-- Interface do Jogo (inicialmente oculta) -->
    <main class="container-lg py-4" id="gameArea" style="display:none;">
        <!-- Card de Descrição do Nível -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h2 class="card-title"><span id="levelTitle">Nível ?</span></h2>
                <p id="levelDescription" class="text-body-secondary"></p>
                <p id="levelCommand" class="fw-medium"></p>
                <p id="levelExpected" class="fw-medium"></p>
            </div>
        </div>
  
        <!-- Editor -->
        <div class="codemirror-container shadow-sm">
             <textarea id="code" class="editor" aria-label="Editor de Código Python" aria-describedby="levelDescription">
# Comece a codar aqui...
             </textarea>
        </div>
  
        <!-- Status de Turno -->
        <div id="gameStatusArea" class="d-flex align-items-center gap-3 bg-body-tertiary p-2 rounded shadow-sm mb-4">
            <span id="currentPlayerIndicator" class="fw-bold" title="Jogador atual">Carregando...</span>
            <div class="progress flex-grow-1" role="progressbar" aria-label="Tempo restante do turno" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" id="turnTimerProgressContainer">
                <div class="progress-bar progress-bar-striped progress-bar-animated" id="turnTimerProgress" style="width: 100%"></div>
            </div>
            <span id="turnTimeDisplay" class="text-body-secondary" title="Tempo restante">--:--</span>
            <button type="button" id="passTurnButton" class="btn btn-secondary btn-sm" title="Passar a Vez">
                 <i data-feather="fast-forward"></i>
                 <span class="visually-hidden">Passar a Vez</span>
            </button>
        </div>
  
        <!-- Botões de Controle -->
        <div class="d-flex justify-content-between mb-4">
            <button type="button" id="resetButton" class="btn btn-danger flex-fill" title="Resetar código e turno">
                <i data-feather="trash-2" class="me-1"></i> Resetar
            </button>
            <button type="button" id="runButton" class="btn btn-success flex-fill" title="Executar o código (simulação)">
                <i data-feather="play" class="me-1"></i> Run
            </button>
            <button type="button" id="sendButton" class="btn btn-accent flex-fill" title="Enviar código para validação">
                <i data-feather="send" class="me-1"></i> Enviar
            </button>
        </div>
  
        <!-- Output -->
        <div id="output" class="output-block" role="log" aria-live="polite">
            A saída do seu código aparecerá aqui...
        </div>
    </main>
  
    <footer class="mt-auto p-3 text-center border-top text-body-secondary">
        GitGame &copy; <span id="currentYear"></span>
    </footer>
  
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/node-waves/0.7.6/waves.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/selection/active-line.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // --- Lobby e Configuração da Sala ---
            const lobbyForm = document.getElementById("lobbyForm");
            const roomNameInput = document.getElementById("roomName");
            const roomPasswordInput = document.getElementById("roomPassword");
            const playerNameInput = document.getElementById("playerName");
            const isHostCheckbox = document.getElementById("isHost");
            const hostOptionsDiv = document.getElementById("hostOptions");
  
            isHostCheckbox.addEventListener("change", function () {
                hostOptionsDiv.style.display = this.checked ? "block" : "none";
            });
  
            lobbyForm.addEventListener("submit", function (e) {
                e.preventDefault();
                const roomName = roomNameInput.value.trim();
                const roomPassword = roomPasswordInput.value;
                const playerName = playerNameInput.value.trim();
                const isHost = isHostCheckbox.checked;
                const turnTime = document.getElementById("turnTime").value;
  
                if (isHost) {
                    // Cria a sala via API REST
                    fetch("/createRoom", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ roomName, password: roomPassword, hostName: playerName, turnTime })
                    }).then(response => response.json())
                      .then(data => {
                          if (data.message) {
                              joinRoom(roomName, playerName);
                          }
                      }).catch(err => alert("Erro ao criar sala: " + err));
                } else {
                    joinRoom(roomName, playerName);
                }
            });
  
            // Conecta à sala via Socket.io e esconde o lobby
            function joinRoom(roomName, playerName) {
                socket.emit("joinRoomSocket", { roomName, playerName });
                document.getElementById("lobbyArea").style.display = "none";
                document.getElementById("gameArea").style.display = "block";
            }
  
            // --- Inicialização do Editor CodeMirror ---
            let editor = CodeMirror.fromTextArea(document.getElementById("code"), {
                mode: "python",
                theme: "darcula",
                lineNumbers: true,
                indentUnit: 4,
                tabSize: 4,
                matchBrackets: true,
                styleActiveLine: true,
                autofocus: true,
                readOnly: "nocursor"
            });
  
            // Seletores da UI do jogo
            const currentPlayerIndicator = document.getElementById("currentPlayerIndicator");
            const turnTimerProgress = document.getElementById("turnTimerProgress");
            const turnTimeDisplay = document.getElementById("turnTimeDisplay");
            const passTurnButton = document.getElementById("passTurnButton");
            const runButton = document.getElementById("runButton");
            const resetButton = document.getElementById("resetButton");
            const sendButton = document.getElementById("sendButton");
            const outputDiv = document.getElementById("output");
            const levelTitle = document.getElementById("levelTitle");
            const levelDescription = document.getElementById("levelDescription");
            const levelCommand = document.getElementById("levelCommand");
            const levelExpected = document.getElementById("levelExpected");
            const yearSpan = document.getElementById("currentYear");
  
            let myID = null;
            let currentTurnID = null;
            let turnTimeRemaining = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--turn-time-total'));
  
            const socket = io();
  
            // Recebe seu ID
            socket.on("yourID", id => { myID = id; });
  
            // Atualiza o estado da sala
            socket.on("stateUpdate", state => {
                editor.setValue(state.currentCode);
                levelTitle.textContent = "Nível " + state.currentLevel.id;
                levelDescription.textContent = state.currentLevel.context;
                levelCommand.innerHTML = "<strong>Comando:</strong> " + state.currentLevel.command;
                if (state.currentLevel.inputs) {
                    levelExpected.innerHTML = "<strong>Input:</strong> " + state.currentLevel.chosenInput.join(", ") +
                        " | <strong>Saída esperada (" + state.currentLevel.expectedType + "):</strong> " + state.currentLevel.chosenExpectedOutput;
                } else {
                    levelExpected.innerHTML = "<strong>Saída esperada (" + state.currentLevel.expectedType + "):</strong> " + state.currentLevel.expectedValue;
                }
                outputDiv.textContent = "";
            });
  
            // Atualiza o código colaborativo
            socket.on("codeUpdate", newCode => {
                const current = editor.getValue();
                if (current !== newCode) {
                    const cursor = editor.getCursor();
                    editor.setValue(newCode);
                    editor.setCursor(cursor);
                }
            });
  
            // Atualiza o cronômetro do turno (recebido do servidor)
            socket.on("turnTimerUpdate", remaining => {
                turnTimeRemaining = remaining;
                turnTimeDisplay.textContent = new Date(remaining * 1000).toISOString().substr(14, 5);
                let percentage = (remaining / parseInt(getComputedStyle(document.documentElement).getPropertyValue('--turn-time-total'))) * 100;
                turnTimerProgress.style.width = percentage + "%";
                turnTimerProgress.classList.remove("bg-success", "bg-warning", "bg-danger");
                if (percentage > 50) turnTimerProgress.classList.add("bg-success");
                else if (percentage > 20) turnTimerProgress.classList.add("bg-warning");
                else turnTimerProgress.classList.add("bg-danger");
            });
  
            // Atualiza o turno: o servidor envia o ID do jogador com a vez
            socket.on("turnUpdate", turnID => {
                currentTurnID = turnID;
                if (myID === turnID) {
                    currentPlayerIndicator.textContent = "Sua vez!";
                    currentPlayerIndicator.classList.remove("text-warning");
                    currentPlayerIndicator.classList.add("text-success");
                    editor.setOption("readOnly", false);
                    passTurnButton.disabled = false;
                } else {
                    currentPlayerIndicator.textContent = "Vez do Jogador: " + turnID;
                    currentPlayerIndicator.classList.remove("text-success");
                    currentPlayerIndicator.classList.add("text-warning");
                    editor.setOption("readOnly", "nocursor");
                    passTurnButton.disabled = true;
                }
            });
  
            // Envia atualizações do editor (apenas se for sua vez)
            function debounce(func, delay) {
                let timeout;
                return function(...args) {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => func.apply(this, args), delay);
                };
            }
  
            editor.on("change", debounce(() => {
                if (myID === currentTurnID) {
                    socket.emit("codeUpdate", editor.getValue());
                }
            }, 300));
  
            // Botões de controle
            passTurnButton.addEventListener("click", () => {
                if (myID === currentTurnID) socket.emit("passTurn");
            });
  
            resetButton.addEventListener("click", () => {
                if (confirm("Resetar código e turno?")) {
                    socket.emit("resetGame");
                }
            });
  
            runButton.addEventListener("click", () => {
                // Execução local simulada para visualização
                outputDiv.textContent = "Saída simulada:\n" + editor.getValue();
                outputDiv.className = "output-block";
            });
  
            sendButton.addEventListener("click", () => {
                outputDiv.textContent = "Processando...";
                socket.emit("submitCode");
            });
  
            socket.on("submissionResult", result => {
                outputDiv.textContent = result.message;
                outputDiv.className = "output-block " + (result.success ? "success" : "error");
            });
  
            socket.on("gameComplete", message => {
                alert(message);
                editor.setValue("");
            });
  
            // Atualiza o ano no rodapé
            yearSpan.textContent = new Date().getFullYear();
  
            // Inicializa Feather e Waves
            try { feather.replace(); } catch (e) { console.error(e); }
            try { Waves.init(); Waves.attach(".btn", ["waves-light"]); } catch (e) { console.error(e); }
        });
    </script>
</body>
</html>
